services:
  generator:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./app:/app
      - ./data:/data
    command: python generator.py

  realtime:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./app:/app
      - ./data:/data
    command: python realtime.py
    depends_on:
      - generator

  batch:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./app:/app
      - ./data:/data
    command: python batch.py
    depends_on:
      - generator
